<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Jujutsu Kaisen Online</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #app { width: 700px; height: 500px; background: #111; border: 2px solid #4a00e0; display: flex; border-radius: 10px; overflow: hidden; }
        .sidebar { width: 200px; border-right: 1px solid #333; padding: 10px; background: #0a0a0a; }
        .main { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; }
        .chat { height: 150px; background: #000; margin-top: auto; padding: 10px; overflow-y: auto; font-size: 12px; border: 1px solid #222; }
        .screen { display: none; width: 100%; height: 100%; }
        .active { display: block; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #222; border: 1px solid #444; color: white; }
        button { width: 100%; padding: 10px; background: #4a00e0; color: white; border: none; cursor: pointer; margin-top: 5px; }
        .player-online { font-size: 14px; color: #8e2de2; margin-bottom: 5px; border-bottom: 1px solid #222; }
        .system-msg { color: #555; font-style: italic; }
    </style>
</head>
<body>

<div id="app">
    <!-- Экраны входа -->
    <div id="screen-auth" class="screen active" style="padding: 50px; text-align: center;">
        <h1>JUJUTSU ONLINE</h1>
        <input type="text" id="username" placeholder="Имя мага">
        <select id="tech" style="width:100%; padding:10px; background: #222; color:white;">
            <option value="Десять Теней">Десять Теней</option>
            <option value="Манипуляция Кровью">Манипуляция Кровью</option>
        </select>
        <button onclick="connectToServer()">ВОЙТИ В МИР</button>
    </div>

    <!-- Игровой мир -->
    <div id="screen-game" class="screen" style="display: flex; width: 100%;">
        <div class="sidebar">
            <h4>ОНЛАЙН МАГИ</h4>
            <div id="player-list"></div>
        </div>
        <div class="main">
            <h2 id="my-name">Маг</h2>
            <div id="game-world" style="flex-grow: 1;">
                <p>Добро пожаловать в онлайн мир! Здесь вы будете видеть других игроков.</p>
                <button onclick="alert('Бой с боссом!')">ИЗГНАТЬ ПРОКЛЯТИЕ</button>
            </div>
            
            <div class="chat" id="chat-box"></div>
            <input type="text" id="chat-input" placeholder="Написать в чат..." onkeypress="if(event.keyCode==13) sendMessage()">
        </div>
    </div>
</div>

<script>
    let socket;
    let myData = {};

    function connectToServer() {
        const name = document.getElementById('username').value;
        const tech = document.getElementById('tech').value;
        if(!name) return alert("Введи имя!");

        // Подключаемся к серверу (здесь должен быть IP твоего сервера)
        socket = io("http://localhost:3000"); 

        socket.on('connect', () => {
            myData = { name, tech, lvl: 1 };
            socket.emit('join_game', myData);
            document.getElementById('my-name').innerText = name + " (" + tech + ")";
            showScreen('screen-game');
        });

        socket.on('chat_message', (data) => {
            const box = document.getElementById('chat-box');
            const msg = document.createElement('div');
            if(data.system) {
                msg.className = 'system-msg';
                msg.innerText = data.msg;
            } else {
                msg.innerHTML = `<b style="color:#8e2de2">${data.name}:</b> ${data.msg}`;
            }
            box.appendChild(msg);
            box.scrollTop = box.scrollHeight;
        });

        socket.on('update_players', (players) => {
            const list = document.getElementById('player-list');
            list.innerHTML = "";
            for(let id in players) {
                const p = players[id];
                list.innerHTML += `<div class="player-online">${p.name} [Lvl ${p.lvl}]</div>`;
            }
        });
    }

    function sendMessage() {
        const input = document.getElementById('chat-input');
        if(input.value) {
            socket.emit('send_message', input.value);
            input.value = "";
        }
    }

    function showScreen(id) {
        document.getElementById('screen-auth').style.display = 'none';
        document.getElementById('screen-game').style.display = 'none';
        document.getElementById(id).style.display = (id === 'screen-game' ? 'flex' : 'block');
    }
</script>
</body>
</html>
