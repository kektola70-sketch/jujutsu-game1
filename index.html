<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Jujutsu Kaisen: Cursed Era</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            width: 400px;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #4a00e0;
            box-shadow: 0 0 20px rgba(74, 0, 224, 0.5);
            text-align: center;
        }

        h1 { color: #8e2de2; text-shadow: 2px 2px #000; }
        
        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            background: #333;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 5px;
            border: none;
            background: linear-gradient(to right, #8e2de2, #4a00e0);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.02); opacity: 0.9; }

        .hidden { display: none; }
        
        .stat-box {
            background: #252525;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            text-align: left;
            font-size: 14px;
        }

        .menu-btn { background: #333; border: 1px solid #4a00e0; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- ЭКРАН ПРИВЕТСТВИЯ -->
    <div id="start-screen">
        <h1>JUJUTSU KAISEN</h1>
        <p>Магическая Битва</p>
        <button onclick="showScreen('login-screen')">Войти</button>
        <button onclick="showScreen('register-screen')">Регистрация</button>
    </div>

    <!-- ЭКРАН РЕГИСТРАЦИИ -->
    <div id="register-screen" class="hidden">
        <h2>Новый Маг</h2>
        <input type="text" id="reg-name" placeholder="Имя персонажа">
        <input type="password" id="reg-pass" placeholder="Пароль">
        <select id="reg-tech">
            <option value="Техника Десяти Теней">Техника Десяти Теней</option>
            <option value="Манипуляция Кровью">Манипуляция Кровью</option>
            <option value="Проклятая Речь">Проклятая Речь</option>
            <option value="Бесконечность">Бесконечность (Уч. версия)</option>
        </select>
        <button onclick="register()">Создать аккаунт</button>
        <button onclick="showScreen('start-screen')" style="background: gray;">Назад</button>
    </div>

    <!-- ЭКРАН ВХОДА -->
    <div id="login-screen" class="hidden">
        <h2>Вход в Техникум</h2>
        <input type="text" id="login-name" placeholder="Имя мага">
        <input type="password" id="login-pass" placeholder="Пароль">
        <button onclick="login()">Войти в игру</button>
        <button onclick="showScreen('start-screen')" style="background: gray;">Назад</button>
    </div>

    <!-- ГЛАВНОЕ МЕНЮ ИГРЫ -->
    <div id="main-menu" class="hidden">
        <h2 id="user-display">Маг: ???</h2>
        <div class="stat-box">
            <div id="stat-rank">Ранг: 4-й</div>
            <div id="stat-tech">Техника: ---</div>
            <div id="stat-lvl">Уровень: 1</div>
        </div>
        <button class="menu-btn" onclick="alert('Поиск проклятий начат...')">Охота на проклятия</button>
        <button class="menu-btn" onclick="alert('Магазин закрыт на перерыв')">Магазин артефактов</button>
        <button class="menu-btn" onclick="logout()" style="color: #ff4d4d;">Выйти</button>
    </div>
</div>

<script>
    let currentPlayer = null;

    // Функция переключения экранов
    function showScreen(screenId) {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('register-screen').classList.add('hidden');
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-menu').classList.add('hidden');
        
        document.getElementById(screenId).classList.remove('hidden');
    }

    // Регистрация
    function register() {
        const name = document.getElementById('reg-name').value;
        const pass = document.getElementById('reg-pass').value;
        const tech = document.getElementById('reg-tech').value;

        if (!name || !pass) { alert("Заполни все поля!"); return; }

        let players = JSON.parse(localStorage.getItem('jujutsu_players') || "[]");
        
        if (players.find(p => p.name === name)) {
            alert("Это имя уже занято!");
            return;
        }

        const newPlayer = {
            name: name,
            pass: pass,
            tech: tech,
            level: 1,
            rank: "4-й ранг"
        };

        players.push(newPlayer);
        localStorage.setItem('jujutsu_players', JSON.stringify(players));
        
        alert("Регистрация успешна!");
        showScreen('login-screen');
    }

    // Вход
    function login() {
        const name = document.getElementById('login-name').value;
        const pass = document.getElementById('login-pass').value;

        let players = JSON.parse(localStorage.getItem('jujutsu_players') || "[]");
        const user = players.find(p => p.name === name && p.pass === pass);

        if (user) {
            currentPlayer = user;
            updateMenu();
            showScreen('main-menu');
        } else {
            alert("Неверное имя или пароль!");
        }
    }

    // Обновление данных в меню
    function updateMenu() {
        document.getElementById('user-display').innerText = "Маг: " + currentPlayer.name;
        document.getElementById('stat-rank').innerText = "Ранг: " + currentPlayer.rank;
        document.getElementById('stat-tech').innerText = "Техника: " + currentPlayer.tech;
        document.getElementById('stat-lvl').innerText = "Уровень: " + currentPlayer.level;
    }

    function logout() {
        currentPlayer = null;
        showScreen('start-screen');
    }
</script>

</body>
</html>
